name: Mobile Tests

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - ".github/workflows/mobile-tests.yml"
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - ".github/workflows/mobile-tests.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
        working-directory: .
      - run: npx tsc --noEmit
      - run: npx expo lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
        working-directory: .
      - run: npx jest --ci --coverage --maxWorkers=2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/mobile/coverage/
          retention-days: 7

  e2e-ios:
    name: E2E (iOS Simulator)
    runs-on: macos-14
    if: false # Disabled until Detox is fully configured on CI
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
        working-directory: .
      - name: Build iOS app
        run: npx detox build --configuration ios.sim.debug
      - name: Run E2E tests
        run: npx detox test --configuration ios.sim.debug --cleanup
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: detox-artifacts-ios
          path: apps/mobile/.detox-artifacts/
          retention-days: 7
