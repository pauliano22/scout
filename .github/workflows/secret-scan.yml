name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write  # to post check annotations

jobs:
  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all history for full diff

      - name: Scan changed files for secrets
        id: scan
        run: |
          set +e  # don't exit on grep hits
          RC=0
          FOUND=""

          # Determine changed files (against merge-base)
          MERGE_BASE=$(git merge-base origin/main HEAD 2>/dev/null || echo "origin/main")
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACM "$MERGE_BASE"..HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "✅ No changed files to scan."
            exit 0
          fi

          # ─── Secret VALUE patterns (not env-var names) ──────────────────
          # These match actual leaked credentials. Bare-name patterns
          # (SUPABASE_URL, DATABASE_URL, *_KEY as identifiers) were removed:
          # they false-positive on every legitimate `process.env.X` reference
          # and do not indicate a leak. The leak this repo actually had was a
          # hard-coded Supabase service-role JWT, so a JWT value pattern leads.
          PATTERNS=(
            # JWT / Supabase service-role key: header.payload.signature
            'eyJ[A-Za-z0-9_=-]{8,}\.eyJ[A-Za-z0-9_=-]{8,}\.[A-Za-z0-9_=-]{8,}'
            # <secret-ish name> = "actual value" (value required after =/:)
            '(?i)(api[_-]?key|secret[_-]?key|token[_-]?key|service[_-]?role[_-]?key|access[_-]?token|client[_-]?secret|auth[_-]?secret)\s*[=:]\s*[''"][A-Za-z0-9_\-\.]{16,}'
            # PEM private keys
            '(?i)-----BEGIN[ ](RSA|EC|DSA|OPENSSH|PGP)[ ]PRIVATE[ ]KEY-----'
            '-----BEGIN PRIVATE KEY-----'
            # Stripe
            'sk_live_[0-9a-zA-Z]{24,}'
            'sk_test_[0-9a-zA-Z]{24,}'
            'pk_live_[0-9a-zA-Z]{24,}'
            'pk_test_[0-9a-zA-Z]{24,}'
            'whsec_[0-9a-zA-Z]{16,}'
            # OpenAI / Anthropic (sk-ant- first so it is not masked by sk-)
            'sk-ant-[a-zA-Z0-9_\-]{20,}'
            'sk-[a-zA-Z0-9]{20,}'
            # SendGrid / Resend
            'SG\.[a-zA-Z0-9_\-\.]{22,}'
            're_[a-zA-Z0-9]{20,}'
            # GitHub / Slack / Google API / AWS access-key VALUES
            'gh[pousr]_[A-Za-z0-9]{20,}'
            'xox[baprs]-[A-Za-z0-9-]{10,}'
            'AIza[0-9A-Za-z_\-]{30,}'
            'AKIA[0-9A-Z]{16}'
            # password = "value"
            '(?i)(password|passwd|pwd)\s*[=:]\s*[''"][A-Za-z0-9!@#$%^&*()_+\-=\[\]{}|;:,.<>?]{8,}'
            # bearer <token>
            '(?i)bearer\s+[A-Za-z0-9_\-\.]{24,}'
          )

          # ─── process.env in console.log/error ──────────────────────────
          CONSOLE_ENV_PATTERN='console\.(log|error|warn|debug)\s*\([^)]*process\.env'

          # ─── Scan each changed file ──────────────────────────────────────
          for FILE in $CHANGED_FILES; do
            # Skip binary / lock files and scanner definition files
            case "$FILE" in
              *.png|*.jpg|*.jpeg|*.gif|*.ico|*.svg|*.woff|*.woff2|*.ttf|*.eot|*.lock|package-lock.json|yarn.lock|pnpm-lock.yaml)
                continue ;;
              .githooks/pre-commit|.github/workflows/secret-scan.yml)
                continue ;;
            esac
            if [ ! -f "$FILE" ]; then
              continue
            fi

            FILE_PATTERN_HITS=0
            FILE_HITS=""

            for PATTERN in "${PATTERNS[@]}"; do
              HITS=$(grep -Eon "$PATTERN" "$FILE" 2>/dev/null | head -5)
              if [ -n "$HITS" ]; then
                FILE_PATTERN_HITS=$((FILE_PATTERN_HITS + 1))
                FILE_HITS="${FILE_HITS}${HITS}"$'\n'
              fi
            done

            # Check for console.env
            CONSOLE_HITS=$(grep -Eon "$CONSOLE_ENV_PATTERN" "$FILE" 2>/dev/null | head -5)
            if [ -n "$CONSOLE_HITS" ]; then
              FILE_PATTERN_HITS=$((FILE_PATTERN_HITS + 1))
              FILE_HITS="${FILE_HITS}${CONSOLE_HITS}"$'\n'
            fi

            if [ $FILE_PATTERN_HITS -gt 0 ]; then
              echo "────────────────────────────────────────────"
              echo "⚠️  $FILE — $FILE_PATTERN_HITS potential secret(s)"
              echo "$FILE_HITS" | head -20
              FOUND="${FOUND}${FILE}"$'\n'
              RC=1
            fi
          done

          echo ""  # newline before summary
          if [ $RC -ne 0 ]; then
            echo "::error::❌ Secret leak(s) detected in changed files."
            echo ""
            echo "Files with potential secrets:"
            echo "$FOUND"
            echo ""
            echo "Please review and remove any secrets before merging."
          else
            echo "✅ No secrets detected in changed files."
          fi

          exit $RC

      - name: Summarize results
        if: always()
        run: |
          if [ "${{ steps.scan.outcome }}" = "failure" ]; then
            echo "SECRET_SCAN_STATUS=failure" >> $GITHUB_ENV
          else
            echo "SECRET_SCAN_STATUS=passed" >> $GITHUB_ENV
          fi

      - name: Comment on PR (on failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const message = `## ⚠️ Secret Scan Failed

            Potential secrets were detected in one or more changed files in this PR.

            **What to do:**
            1. Review the workflow run logs above for details on which files matched.
            2. Remove hard-coded secrets and use environment variables instead.
            3. If a false positive, add the file to the allowlist in \`.github/workflows/secret-scan.yml\`.
            
            **Never commit:**
            - API keys, tokens, or passwords
            - \`.env.local\`, \`.env\` files
            - Service account credentials
            - Connection strings with credentials

            See \`docs/secrets.md\` for the full secret management policy.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
